[build]
  command   = "node scripts/build.js"
  publish   = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"

[functions."discovery-background"]
  schedule = "0 3 * * *"

[[edge_functions]]
  path     = "/pista.html"
  function = "pista-og"

[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200
