<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fondo crema -->
  <rect width="1200" height="630" fill="#EFEAD9"/>

  <!-- Franjas bermellón arriba y abajo -->
  <rect x="0"   y="0"   width="1200" height="24" fill="#EF5226"/>
  <rect x="0"   y="606" width="1200" height="24" fill="#EF5226"/>

  <!-- Vinilo (izquierda) -->
  <circle cx="220" cy="315" r="170" stroke="#16110D" stroke-width="14" fill="none"/>
  <circle cx="220" cy="315" r="118" stroke="#16110D" stroke-width="7"  fill="none"/>
  <circle cx="220" cy="315" r="66"  stroke="#16110D" stroke-width="7"  fill="none"/>
  <circle cx="220" cy="315" r="22"  fill="#16110D"/>
  <!-- mango -->
  <rect x="390" y="291" width="96" height="48" rx="24" fill="#EF5226"/>

  <!-- REFRITO — textLength garantiza que cabe en el viewBox -->
  <text x="490" y="360"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="148"
    fill="#16110D"
    textLength="670"
    lengthAdjust="spacingAndGlyphs">REFRITO</text>

  <!-- Tagline -->
  <text x="490" y="416"
    font-family="Arial, Helvetica, sans-serif"
    font-size="31"
    fill="#16110D"
    opacity="0.55"
    textLength="670"
    lengthAdjust="spacingAndGlyphs">Tu mixtape de confianza · refrito.org</text>
</svg>
