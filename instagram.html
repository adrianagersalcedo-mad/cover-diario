<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refrito · Maquinillo Instagram</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #16110D;
      color: #EFEAD9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .85rem 1.5rem;
      border-bottom: 1px solid rgba(239,234,217,.1);
      flex-shrink: 0;
    }
    .topbar-logo {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .08em;
      color: #EFEAD9;
      text-decoration: none;
    }
    .topbar-logo img { width: 28px; }
    .topbar-pill {
      background: rgba(239,234,217,.08);
      border-radius: 999px;
      padding: .18rem .7rem;
      font-size: .68rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(239,234,217,.45);
    }

    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid rgba(239,234,217,.1);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      overflow-y: auto;
    }

    .field-label {
      font-size: .65rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(239,234,217,.38);
      margin-bottom: .35rem;
    }

    .sidebar select {
      width: 100%;
      background: rgba(239,234,217,.06);
      border: 1px solid rgba(239,234,217,.13);
      border-radius: 6px;
      color: #EFEAD9;
      padding: .55rem .75rem;
      font-size: .88rem;
      appearance: none;
      cursor: pointer;
    }
    .sidebar select:focus { outline: 2px solid #EF5226; outline-offset: 1px; }

    .cover-card {
      background: rgba(239,234,217,.05);
      border-radius: 8px;
      padding: .9rem;
      font-size: .8rem;
      line-height: 1.55;
      color: rgba(239,234,217,.6);
    }
    .cover-card .song {
      font-size: .95rem;
      font-weight: 700;
      color: #EF5226;
      margin-bottom: .2rem;
    }
    .cover-card .artist { font-weight: 700; color: #EFEAD9; }
    .cover-card .meta   { margin-top: .45rem; font-size: .73rem; opacity: .5; }

    .palette-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .palette-dots span {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid rgba(239,234,217,.12);
    }

    .actions { display: flex; flex-direction: column; gap: .5rem; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      width: 100%;
      padding: .72rem 1rem;
      font-size: .85rem;
      font-weight: 700;
      border-radius: 7px;
      cursor: pointer;
      border: none;
      transition: background .12s, color .12s;
    }
    .btn-primary { background: #EF5226; color: #EFEAD9; }
    .btn-primary:hover { background: #C03C0C; }
    .btn-primary:disabled { background: rgba(239,234,217,.1); color: rgba(239,234,217,.25); cursor: default; }
    .btn-secondary {
      background: transparent;
      color: rgba(239,234,217,.55);
      border: 1px solid rgba(239,234,217,.13);
      font-weight: 400;
    }
    .btn-secondary:hover { border-color: rgba(239,234,217,.35); color: #EFEAD9; }
    .btn-secondary:disabled { opacity: .35; cursor: default; }

    /* ── Canvas area ── */
    .canvas-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: .75rem;
      overflow: hidden;
    }

    .canvas-wrap {
      position: relative;
      /* display canvas at 540×540 — the actual buffer is 1080×1080 */
      width:  540px;
      height: 540px;
      flex-shrink: 0;
      box-shadow: 0 6px 32px rgba(0,0,0,.55);
    }

    canvas {
      display: block;
      width:  540px;
      height: 540px;
    }

    .canvas-hint {
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(239,234,217,.22);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(22,17,13,.75);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      color: rgba(239,234,217,.4);
      letter-spacing: .05em;
    }
    .overlay.hidden { display: none; }

    textarea {
      width: 100%;
      background: rgba(239,234,217,.06);
      border: 1px solid rgba(239,234,217,.13);
      border-radius: 6px;
      color: rgba(239,234,217,.75);
      padding: .65rem .75rem;
      font-size: .78rem;
      line-height: 1.55;
      font-family: inherit;
      resize: vertical;
      min-height: 160px;
    }
    textarea:focus { outline: 2px solid #EF5226; outline-offset: 1px; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">
    <img src="logo.svg" alt="Refrito"> REFRITO
  </a>
  <span class="topbar-pill">Maquinillo Instagram</span>
</div>

<div class="main">

  <aside class="sidebar">
    <div>
      <div class="field-label">Pista</div>
      <select id="picker"><option value="">Cargando…</option></select>
    </div>

    <div id="cover-card" class="cover-card" style="display:none"></div>

    <div id="palette-wrap" style="display:none">
      <div class="field-label">Paleta</div>
      <div class="palette-dots" id="palette-dots"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary"   id="btn-dl"   disabled>↓ Descargar PNG 1080×1080</button>
      <button class="btn btn-secondary" id="btn-copy" disabled>Copiar imagen</button>
    </div>

    <div id="caption-wrap" style="display:none">
      <div class="field-label" style="margin-bottom:.5rem">Caption Instagram</div>
      <textarea id="caption-text" readonly></textarea>
      <button class="btn btn-secondary" id="btn-caption" style="margin-top:.4rem">Copiar caption</button>
    </div>

  </aside>

  <section class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="canvas" width="1080" height="1080"></canvas>
      <div class="overlay hidden" id="overlay">Generando…</div>
    </div>
    <div class="canvas-hint">1080 × 1080 px · Instagram feed</div>
  </section>

</div>

<script>
// ─── PALETAS ──────────────────────────────────────────────────────────────────

const PALETTES = [
  { bg: '#EFEAD9', frame: '#EF5226', text: '#16110D' },
  { bg: '#C97A9C', frame: '#16110D', text: '#16110D' },
  { bg: '#7AB897', frame: '#EF5226', text: '#16110D' },
  { bg: '#C9A04A', frame: '#16110D', text: '#16110D' },
];

function paletteForDate(iso) {
  const days = Math.floor(new Date(iso).getTime() / 86400000);
  return PALETTES[((days % 4) + 4) % 4];
}

// Color de texto sobre la banda frame-color
function onFrame(hex) {
  return (hex === '#EF5226' || hex === '#16110D') ? '#EFEAD9' : '#16110D';
}

// ─── FECHA ────────────────────────────────────────────────────────────────────

const MESES = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
function fmtFecha(iso) {
  const [y, m, d] = iso.split('-');
  return `${parseInt(d)} ${MESES[parseInt(m)-1]} ${y}`;
}

// ─── TIPOGRAFÍA ───────────────────────────────────────────────────────────────

// Devuelve { lines: string[], size: number }
// Intenta el mayor tamaño posible, en 1 o 2 líneas, sin que nada desborde maxWidth.
function fitLines(ctx, text, maxWidth, startSize, weight, family) {
  const words = text.split(' ');

  // ── 1 línea: reducir fuente hasta que quepa ──
  let size1 = startSize;
  ctx.font = `${weight} ${size1}px ${family}`;
  while (ctx.measureText(text).width > maxWidth && size1 > 18) {
    size1 -= 2;
    ctx.font = `${weight} ${size1}px ${family}`;
  }

  if (words.length < 2) return { lines: [text], size: size1 };

  // ── 2 líneas: probar cada punto de corte y quedarnos con el que permita mayor fuente ──
  let best = { lines: [text], size: size1 };

  for (let split = 1; split < words.length; split++) {
    const l1 = words.slice(0, split).join(' ');
    const l2 = words.slice(split).join(' ');
    let s = startSize;
    ctx.font = `${weight} ${s}px ${family}`;
    while (
      (ctx.measureText(l1).width > maxWidth || ctx.measureText(l2).width > maxWidth)
      && s > 18
    ) {
      s -= 2;
      ctx.font = `${weight} ${s}px ${family}`;
    }
    if (s > best.size) best = { lines: [l1, l2], size: s };
  }

  return best;
}

// ─── VINILO ───────────────────────────────────────────────────────────────────

function drawVinyl(ctx, cx, cy, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  [[r, 4], [r*.66, 2.5], [r*.33, 2]].forEach(([radius, lw]) => {
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.stroke();
  });
  ctx.beginPath();
  ctx.arc(cx, cy, r*.12, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// Vinilo decorativo grande (para fondo de zona)
function drawVinylBig(ctx, cx, cy, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  // Anillos exteriores con grosor variable — simula surcos de vinilo
  const rings = [1, .82, .66, .52, .40, .30, .21, .14];
  rings.forEach((ratio, i) => {
    ctx.lineWidth = i === 0 ? 10 : i < 3 ? 4 : 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r * ratio, 0, Math.PI * 2);
    ctx.stroke();
  });
  // Etiqueta central (círculo relleno)
  ctx.beginPath();
  ctx.arc(cx, cy, r * .22, 0, Math.PI * 2);
  ctx.fill();
  // Agujero central
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(cx, cy, r * .05, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ─── LOGO EN CANVAS ───────────────────────────────────────────────────────────
// Reproduce el logo.svg (viewBox 0 0 76 44) a cualquier escala.

function drawLogo(ctx, x, y, width, colors) {
  const s = width / 76;
  const c = colors || { orange: '#EF5226', dark: '#16110D' };
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // Mango
  ctx.fillStyle = c.dark;
  ctx.beginPath();
  ctx.moveTo(38, 14); ctx.lineTo(68, 4);
  ctx.quadraticCurveTo(72, 2.5, 72.5, 6);
  ctx.quadraticCurveTo(73, 9, 69, 10.5);
  ctx.lineTo(40, 19);
  ctx.closePath();
  ctx.fill();

  // Ojal del mango
  ctx.fillStyle = c.orange;
  ctx.beginPath();
  ctx.arc(70, 7.2, 1.6, 0, Math.PI * 2);
  ctx.fill();

  // Borde sartén
  ctx.fillStyle = c.orange;
  ctx.beginPath();
  ctx.arc(22, 22, 21, 0, Math.PI * 2);
  ctx.fill();

  // Cuerpo vinilo
  ctx.fillStyle = c.dark;
  ctx.beginPath();
  ctx.arc(22, 22, 17.5, 0, Math.PI * 2);
  ctx.fill();

  // Surcos
  [[14.8,1.3],[12.2,1.1],[9.8,1.0],[7.5,0.9],[5.4,0.85]].forEach(([r, lw]) => {
    ctx.strokeStyle = c.orange;
    ctx.lineWidth   = lw;
    ctx.beginPath();
    ctx.arc(22, 22, r, 0, Math.PI * 2);
    ctx.stroke();
  });

  // Etiqueta central
  ctx.fillStyle = c.orange;
  ctx.beginPath();
  ctx.arc(22, 22, 3, 0, Math.PI * 2);
  ctx.fill();

  // Agujero central
  ctx.fillStyle = c.dark;
  ctx.beginPath();
  ctx.arc(22, 22, 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ─── PLANTILLA INTRO ──────────────────────────────────────────────────────────

function drawIntro() {
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const W      = 1080;

  ctx.clearRect(0, 0, W, W);

  // Fondo crema
  ctx.fillStyle = '#EFEAD9';
  ctx.fillRect(0, 0, W, W);

  // Logo grande centrado
  const logoW = 720;
  const logoH = logoW * (44 / 76); // ≈ 416px
  const logoX = (W - logoW) / 2;
  const logoY = 110;
  drawLogo(ctx, logoX, logoY, logoW);

  // Línea separadora
  ctx.strokeStyle = '#16110D';
  ctx.globalAlpha = 0.12;
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(72, logoY + logoH + 60);
  ctx.lineTo(W - 72, logoY + logoH + 60);
  ctx.stroke();
  ctx.globalAlpha = 1;

  const textY = logoY + logoH + 60; // ≈ 646

  // REFRITO
  ctx.fillStyle  = '#16110D';
  ctx.font       = 'bold 124px Arial, Helvetica, sans-serif';
  ctx.textAlign  = 'center';
  ctx.fillText('REFRITO', W / 2, textY + 114);

  // Tagline
  ctx.font        = '46px Arial, Helvetica, sans-serif';
  ctx.globalAlpha = 0.48;
  ctx.fillText('Un cover al día.', W / 2, textY + 185);
  ctx.globalAlpha = 1;

  // refrito.org
  ctx.font      = '32px Arial, Helvetica, sans-serif';
  ctx.fillStyle = '#EF5226';
  ctx.fillText('refrito.org', W / 2, textY + 350);

  ctx.textAlign = 'left';
}

// ─── DISEÑO ───────────────────────────────────────────────────────────────────
//
//  0 ──── 80:   CABECERA  (p.text bg)    REFRITO + nº pista
//  80 ─── 480:  CANCIÓN   (p.bg)         vinilo decorativo · título · "versiona a"
//  480 ── 1080: ARTISTA   (p.frame bg)   nº pista ghost · nombre · refrito.org
//

function drawCover(cover) {
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const p      = paletteForDate(cover.fecha);
  const ft     = onFrame(p.frame);
  const W      = 1080;
  const M      = 72;

  ctx.clearRect(0, 0, W, W);

  // ── Fondos ───────────────────────────────────────────────────────────────
  ctx.fillStyle = p.bg;    ctx.fillRect(0,   0, W, 480);
  ctx.fillStyle = p.frame; ctx.fillRect(0, 480, W, 600);

  // ── ELEMENTO DECORATIVO 1: vinilo grande en zona canción ─────────────────
  // Centrado verticalmente en la zona, anclado a la derecha (desborda)
  drawVinylBig(ctx, W - 20, 280, 230, p.frame, 0.13);

  // ── ELEMENTO DECORATIVO 2: número de pista ghost en zona artista ─────────
  if (cover.numeroPista) {
    const num = String(cover.numeroPista).padStart(2, '0');
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.fillStyle   = ft;
    ctx.font        = `bold 520px Arial, Helvetica, sans-serif`;
    ctx.textAlign   = 'right';
    ctx.fillText(num, W + 40, 1080);
    ctx.textAlign   = 'left';
    ctx.restore();
  }

  // ── CABECERA (0 → 80) ────────────────────────────────────────────────────
  ctx.fillStyle = p.text;
  ctx.fillRect(0, 0, W, 80);

  drawVinyl(ctx, 42, 40, 22, '#EFEAD9');

  ctx.fillStyle = '#EFEAD9';
  ctx.font      = 'bold 36px Arial, Helvetica, sans-serif';
  ctx.fillText('REFRITO', 78, 52);

  const pistaStr = cover.numeroPista
    ? `PISTA ${cover.numeroPista}  ·  ${fmtFecha(cover.fecha)}`
    : fmtFecha(cover.fecha);
  ctx.font        = '21px Arial, Helvetica, sans-serif';
  ctx.fillStyle   = '#EFEAD9';
  ctx.globalAlpha = 0.4;
  ctx.textAlign   = 'right';
  ctx.fillText(pistaStr, W - M, 50);
  ctx.textAlign   = 'left';
  ctx.globalAlpha = 1;

  // ── ZONA CANCIÓN: título ─────────────────────────────────────────────────
  // Texto confinado a la mitad izquierda para no tapar el vinilo
  const songMaxW = W * 0.62;
  const song = cover.tituloCancion || '';
  const { lines: songLines, size: songSize } =
    fitLines(ctx, song, songMaxW, 108, 'bold', 'Arial, Helvetica, sans-serif');
  const songLineH  = songSize * 1.1;
  const songTotalH = songLines.length * songLineH - (songLineH - songSize);
  const songY      = 80 + (360 - songTotalH) / 2 + songSize;

  ctx.fillStyle = p.frame;
  ctx.font      = `bold ${songSize}px Arial, Helvetica, sans-serif`;
  songLines.forEach((line, i) => ctx.fillText(line, M, songY + i * songLineH));

  // "versiona a" bajo el título
  ctx.fillStyle   = p.text;
  ctx.font        = '28px Arial, Helvetica, sans-serif';
  ctx.globalAlpha = 0.38;
  ctx.fillText(`versiona a ${cover.artistaOriginal || ''}`, M, 458);
  ctx.globalAlpha = 1;

  // ── ZONA ARTISTA: nombre ─────────────────────────────────────────────────
  const artist = (cover.interpreteCover || '').toUpperCase();
  const { lines: artistLines, size: artistSize } =
    fitLines(ctx, artist, W - M * 2, 196, 'bold', 'Arial, Helvetica, sans-serif');
  const artistLineH  = artistSize * 1.04;
  const artistTotalH = artistLines.length * artistLineH - (artistLineH - artistSize);
  const artistY      = 480 + (560 - artistTotalH) / 2 + artistSize;

  ctx.fillStyle = ft;
  ctx.font      = `bold ${artistSize}px Arial, Helvetica, sans-serif`;
  artistLines.forEach((line, i) => ctx.fillText(line, M, artistY + i * artistLineH));

  // refrito.org abajo derecha
  ctx.font        = '24px Arial, Helvetica, sans-serif';
  ctx.fillStyle   = ft;
  ctx.globalAlpha = 0.4;
  ctx.textAlign   = 'right';
  ctx.fillText('refrito.org', W - M, 1052);
  ctx.textAlign   = 'left';
  ctx.globalAlpha = 1;
}

// ─── CAPTION ──────────────────────────────────────────────────────────────────

function buildCaption(cover) {
  if (cover._intro) {
    return [
      'Esto es Refrito.',
      '',
      'Cada día, alguien versiona una canción que ya conoces. En su habitación, en YouTube, sin grandes pretensiones. Nosotros la encontramos, la escuchamos, y escribimos algo sobre por qué esa versión vale la pena.',
      '',
      'Un cover al día. Curado a mano.',
      '',
      'Empieza ahora en refrito.org → link en bio',
      '',
      '#refrito #covers #música #coverdeldia #musicaindependiente',
    ].join('\n');
  }

  const primerParrafo = (cover.textoCuratorial || '').split('\n\n')[0].trim();

  const hashtags = [
    ...(cover.tags || []).map(t => '#' + t.replace(/-/g, '')),
    '#refrito',
    '#coverdeldia',
  ].join(' ');

  return [
    `"${cover.tituloCancion}" · ${cover.interpreteCover}`,
    `— versiona a ${cover.artistaOriginal}`,
    '',
    primerParrafo,
    '',
    'Escúchalo en refrito.org → link en bio',
    '',
    hashtags,
  ].join('\n');
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────

function updateSidebar(cover) {
  const p   = paletteForDate(cover.fecha);
  const card = document.getElementById('cover-card');
  card.style.display = '';
  card.innerHTML = `
    <div class="song">"${cover.tituloCancion}"</div>
    <div class="artist">${cover.interpreteCover}</div>
    <div>versiona a ${cover.artistaOriginal}</div>
    <div class="meta">Pista ${cover.numeroPista} · ${fmtFecha(cover.fecha)}</div>
  `;

  const dots = document.getElementById('palette-dots');
  dots.innerHTML = '';
  Object.values(p).forEach(color => {
    const s = document.createElement('span');
    s.style.background = color;
    s.title = color;
    dots.appendChild(s);
  });
  document.getElementById('palette-wrap').style.display = '';

  const caption = buildCaption(cover);
  document.getElementById('caption-text').value = caption;
  document.getElementById('caption-wrap').style.display = '';
}

// ─── CARGA ────────────────────────────────────────────────────────────────────

let currentCover = null;

async function loadCover(fecha) {
  document.getElementById('overlay').classList.remove('hidden');
  try {
    if (fecha === 'intro') {
      currentCover = { _intro: true };
      drawIntro();
      document.getElementById('cover-card').style.display = 'none';
      document.getElementById('palette-wrap').style.display = 'none';
      const caption = buildCaption(currentCover);
      document.getElementById('caption-text').value = caption;
      document.getElementById('caption-wrap').style.display = '';
    } else {
      const data = await fetch(`content/covers/${fecha}.json`).then(r => r.json());
      currentCover = data;
      drawCover(data);
      updateSidebar(data);
    }
    document.getElementById('btn-dl').disabled   = false;
    document.getElementById('btn-copy').disabled = false;
  } catch(e) {
    console.error('Error cargando:', e);
  }
  document.getElementById('overlay').classList.add('hidden');
}

async function init() {
  const picker = document.getElementById('picker');
  try {
    const dates = await fetch('content/covers/_list.json').then(r => r.json());
    const today = new Date().toISOString().slice(0, 10);
    const past  = dates.filter(d => d <= today).reverse();

    picker.innerHTML = '';

    const introOpt = document.createElement('option');
    introOpt.value = 'intro';
    introOpt.textContent = '— Post de presentación';
    picker.appendChild(introOpt);

    past.forEach(d => {
      const [y, m, day] = d.split('-');
      const opt = document.createElement('option');
      opt.value = d;
      opt.textContent = `${parseInt(day)} ${MESES[parseInt(m)-1]} ${y}`;
      picker.appendChild(opt);
    });

    loadCover('intro');
  } catch(e) {
    picker.innerHTML = '<option>Error</option>';
    console.error(e);
  }
}

// ─── EVENTOS ──────────────────────────────────────────────────────────────────

document.getElementById('picker').addEventListener('change', e => {
  if (e.target.value) loadCover(e.target.value);
});

document.getElementById('btn-dl').addEventListener('click', () => {
  if (!currentCover) return;
  const link = document.createElement('a');
  link.download = `refrito-${currentCover.fecha}.png`;
  link.href = document.getElementById('canvas').toDataURL('image/png');
  link.click();
});

document.getElementById('btn-caption').addEventListener('click', () => {
  const text = document.getElementById('caption-text').value;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btn-caption');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  });
});

document.getElementById('btn-copy').addEventListener('click', () => {
  if (!currentCover) return;
  document.getElementById('canvas').toBlob(async blob => {
    try {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      const btn = document.getElementById('btn-copy');
      const orig = btn.textContent;
      btn.textContent = '✓ Copiada';
      setTimeout(() => { btn.textContent = orig; }, 1800);
    } catch {
      alert('No se pudo copiar al portapapeles. Usa el botón de descarga.');
    }
  });
});

init();
</script>
</body>
</html>
