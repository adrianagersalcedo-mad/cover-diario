[build]
  command   = "node scripts/build.js"
  publish   = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory        = "netlify/functions"
  node_bundler     = "nft"

[functions."discovery-background"]
  # Semanal: lunes a las 3:00 UTC (antes era diario "0 3 * * *")
  schedule = "0 3 * * 1"

[[edge_functions]]
  path     = "/pista.html"
  function = "pista-og"

[[redirects]]
  from   = "/pista"
  to     = "/pista.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/archivo"
  to     = "/archivo.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/acerca"
  to     = "/acerca.html"
  status = 200
  force  = false

[[redirects]]
  from   = "/og-image/:fecha.png"
  to     = "/.netlify/functions/og-image?fecha=:fecha"
  status = 200

# Tarjeta de marca por defecto (og:image de la home y fallback)
[[redirects]]
  from   = "/og-default.png"
  to     = "/.netlify/functions/og-image"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200
